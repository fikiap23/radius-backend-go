name: radius-backend-dev

services:

  app:
    build:
      context: ..
      dockerfile: build/Dockerfile
    container_name: radius-app
    restart: unless-stopped
    env_file: .env
    ports:
      - "${HTTP_PORT:-8080}:8080"
    volumes:
      - ..:/app
      - go-pkg-cache:/go/pkg
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    networks:
      - radius-network

  postgres:
    image: postgres:16-alpine
    container_name: radius-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-radius}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-radius}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - radius-network

  migrate:
    image: arigaio/atlas:latest
    container_name: radius-migrate
    env_file: .env
    working_dir: /app
    volumes:
      - ..:/app
    command:
      - migrate
      - apply
      - --dir
      - file:///app/migrations
      - --url
      - postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-radius}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - radius-network
    restart: "no"

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: radius-minio
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - radius-network

  minio-init:
    image: minio/mc:latest
    container_name: radius-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/$${MINIO_BUCKET_NAME} &&
      mc anonymous set download local/$${MINIO_BUCKET_NAME}
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-radius}
    networks:
      - radius-network
    restart: "no"

volumes:
  postgres-data:
  go-pkg-cache:
  minio-data:

networks:
  radius-network:
    driver: bridge
